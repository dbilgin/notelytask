name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.35.2

      - name: Install dependencies
        run: flutter pub get

      - name: Apply patches
        run: dart tool/apply_patches.dart

      - name: Run Flutter Analyzer
        run: flutter analyze

  build-linux:
    needs: analyze
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-1.0.0}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update debian version
        run: |
          sed -i "s/Version: .*/Version: ${{ steps.version.outputs.VERSION }}/" debian/debian.yaml

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev rpm

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.35.2

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Apply patches
        run: dart tool/apply_patches.dart

      - name: Build Linux release
        run: flutter build linux --release

      - name: Install flutter_to_debian
        run: dart pub global activate flutter_to_debian

      - name: Build .deb package
        run: flutter_to_debian

      - name: Fix .deb permissions
        run: chmod 644 build/linux/x64/release/debian/*.deb

      - name: Create RPM build structure
        run: |
          RPM_ROOT="$GITHUB_WORKSPACE/rpmbuild"
          SOURCE_DIR="${RPM_ROOT}/SOURCES/notelytask"

          mkdir -p "${RPM_ROOT}/BUILD" "${RPM_ROOT}/BUILDROOT" "${RPM_ROOT}/RPMS" "${RPM_ROOT}/SOURCES" "${RPM_ROOT}/SPECS" "${RPM_ROOT}/SRPMS"
          rm -rf "${SOURCE_DIR}"
          mkdir -p "${SOURCE_DIR}/bundle" "${SOURCE_DIR}/desktop" "${SOURCE_DIR}/pixmaps"

          cp -r build/linux/x64/release/bundle/* "${SOURCE_DIR}/bundle/"
          chmod +x "${SOURCE_DIR}/bundle/notelytask"
          cp assets/icon.png "${SOURCE_DIR}/pixmaps/notelytask.png"

          printf "[Desktop Entry]\nName=NotelyTask\nComment=Task management app\nExec=/opt/notelytask/notelytask\nIcon=notelytask\nType=Application\nCategories=Office;Utility;\n" > "${SOURCE_DIR}/desktop/notelytask.desktop"
          chmod 644 "${SOURCE_DIR}/desktop/notelytask.desktop"

      - name: Build .rpm package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          RPM_ROOT="$GITHUB_WORKSPACE/rpmbuild"

          cat > "${RPM_ROOT}/SPECS/notelytask.spec" <<EOF
          Name:           notelytask
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Task management app
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          BuildArch:      x86_64
          Requires:       gtk3

          %description
          NotelyTask is a task management application built with Flutter.

          %install
          mkdir -p %{buildroot}/opt/notelytask
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/pixmaps
          cp -a %{_sourcedir}/notelytask/bundle/. %{buildroot}/opt/notelytask/
          chmod 755 %{buildroot}/opt/notelytask/notelytask
          ln -s /opt/notelytask/notelytask %{buildroot}/usr/bin/notelytask
          install -m 644 %{_sourcedir}/notelytask/desktop/notelytask.desktop %{buildroot}/usr/share/applications/notelytask.desktop
          install -m 644 %{_sourcedir}/notelytask/pixmaps/notelytask.png %{buildroot}/usr/share/pixmaps/notelytask.png

          %files
          /opt/notelytask
          /usr/bin/notelytask
          /usr/share/applications/notelytask.desktop
          /usr/share/pixmaps/notelytask.png
          EOF

          rpmbuild -bb "${RPM_ROOT}/SPECS/notelytask.spec" \
            --define "_topdir ${RPM_ROOT}" \
            --define "_build_id_links none"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/linux/x64/release/debian/notelytask_${{ steps.version.outputs.VERSION }}_amd64.deb

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: rpmbuild/RPMS/x86_64/notelytask-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm

  build-android:
    needs: analyze
    runs-on: ubuntu-latest
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git rev-list --count

      - name: Setup Android signing
        run: |
          echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/app/key.properties
          echo "${{ secrets.ANDROID_RELEASE_KEY }}" | base64 --decode > android/app/notely.keystore

      - name: Extract version and build number
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-1.0.0}
          BUILD_NUMBER=$(git rev-list --count HEAD || echo "1")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION ($BUILD_NUMBER)"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: 3.35.2

      - name: Install dependencies
        run: flutter pub get

      - name: Apply patches
        run: dart tool/apply_patches.dart

      - name: Build APK
        run: flutter build apk --release --build-name=${{ steps.version.outputs.VERSION }} --build-number=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  create-release:
    needs: [build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME:-1.0.0}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Fix artifact permissions
        run: |
          chmod 644 *.deb 2>/dev/null || true
          chmod 644 *.rpm 2>/dev/null || true

      - name: Rename APK with version
        run: mv app-release.apk notelytask_${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            notelytask_${{ steps.version.outputs.VERSION }}_amd64.deb
            notelytask-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm
            notelytask_${{ steps.version.outputs.VERSION }}.apk
